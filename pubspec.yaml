name: pantau_pegawai
description: Aplikasi monitoring pegawai berbasis Flutter + Supabase + Google Drive
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.8.4

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # UI
  flutter_svg: ^2.0.10+1
  intl: ^0.19.0
  shimmer: ^3.0.0

  # Utils
  uuid: ^4.4.0
  http: ^1.2.1
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
